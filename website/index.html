<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 技能图谱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 OpenClaw 技能图谱</h1>
            <p class="subtitle">已安装的 Agent 技能概览</p>
            <div class="stats">
                <span class="stat-item">
                    <span class="stat-number" id="skill-count">0</span>
                    <span class="stat-label">已安装技能</span>
                </span>
                <span class="stat-item">
                    <span class="stat-number" id="last-update">-</span>
                    <span class="stat-label">更新时间</span>
                </span>
            </div>
        </header>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索技能名称或描述...">
        </div>

        <div class="skills-grid" id="skills-container">
            <!-- Skills will be loaded here -->
        </div>

        <footer>
            <p>Powered by <a href="https://openclaw.ai" target="_blank">OpenClaw</a> | 
            Auto-deployed with GitHub Pages</p>
        </footer>
    </div>

    <script src="skills-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
